name: nightly-benchmark

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  nightly-real-benchmark:
    uses: ./.github/workflows/_gpu-benchmark-run.yml
    with:
      git_ref: main
      git_sha: main
      git_branch: main
      bench_case: real_benchmark
      model_profile: deepseek_v2_lite_chat
      machine_type: g2-standard-4
      provisioning_model: spot
    secrets: inherit
